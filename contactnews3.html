<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
    <title>Contact</title>
    <style>
    .contact-section {
        max-width: 900px;
        margin: 100px auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
    }

    .contact-info h2 {
        font-family: 'Georgia', serif;
        font-size: 2.5rem;
        margin-bottom: 20px;
    }

    .contact-info p {
        color: #666;
        margin-bottom: 40px;
    }

    .contact-detail {
        margin-bottom: 20px;
    }

    .contact-detail label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: #8b7e66;
        margin-bottom: 5px;
    }

    .contact-form input, .contact-form textarea {
        width: 100%;
        padding: 15px 0;
        border: none;
        border-bottom: 1px solid #ddd;
        background: transparent;
        font-family: 'Inter', sans-serif;
        margin-bottom: 30px;
        outline: none;
        transition: border-color 0.3s;
    }

    .contact-form input:focus, .contact-form textarea:focus {
        border-bottom: 1px solid #1a1a1a;
    }

    .submit-btn {
        background: #1a1a1a;
        color: #fff;
        padding: 15px 40px;
        border: none;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.7rem;
        cursor: pointer;
    }

    @media (max-width: 768px) {
        .contact-section { grid-template-columns: 1fr; gap: 40px; }
    }
</style>
</head>
<body>

<section class="contact-section">
    <div class="contact-info">
        <h2>Let's connect.</h2>
        <p>Whether you're interested in contributing, advertising, or simply sharing a thought—we're listening.</p>
        
        <div class="contact-detail">
            <label>Submissions</label>
            <span>hello@balancedjournal.com</span>
        </div>
        <div class="contact-detail">
            <label>Studio</label>
            <span>1200 Editorial Way, NY</span>
        </div>
    </div>

    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email Address" required>
        <textarea placeholder="Your Message" rows="4"></textarea>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</section>
</body>
</html>
