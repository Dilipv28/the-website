    .contact-section {
        max-width: 900px;
        margin: 100px auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
    }

    .contact-info h2 {
        font-family: 'Georgia', serif;
        font-size: 2.5rem;
        margin-bottom: 20px;
    }

    .contact-info p {
        color: #221d1d;
        margin-bottom: 40px;
    }

    .contact-detail {
        margin-bottom: 20px;
    }

    .contact-detail label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: bold ;
        color: #2c2a1d;
        margin-bottom: 5px;
    }

    .contact-form input, .contact-form textarea {
        width: 100%;
        padding: 15px 0;
        border: none;
        border-bottom: 1px solid #7a6f6f;
        background: transparent;
        font-family: 'Inter', sans-serif;
        margin-bottom: 30px;
        outline: none;
        transition: border-color 0.3s;
    }

    .contact-form input:focus, .contact-form textarea:focus {
        border-bottom: 1px solid #1a1a1a;
    }

    .submit-btn {
        background: #1a1a1a;
        color: #fff;
        padding: 15px 40px;
        border: none;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.7rem;
        cursor: pointer;
    }

    @media (max-width: 768px) {
        .contact-section { grid-template-columns: 1fr; gap: 40px; }
