<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfbf8;
            color: #1a1a1a;
        }

        .features-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        /* Section Header */
        .features-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .features-header span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #8b7e66;
            display: block;
            margin-bottom: 15px;
        }

        .features-header h2 {
            font-family: 'Georgia', serif;
            font-size: 3rem;
            font-weight: 400;
        }

        /* Feature Grid Layout */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 280px;
            gap: 25px;
        }

        .feature-card {
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
            background-color: #000;
            border-radius: 2px;
        }

        /* Large Feature (Spans 2 columns and 2 rows) */
        .feature-card.main-feature {
            grid-column: span 2;
            grid-row: span 2;
        }

        /* Landscape Feature (Spans 2 columns) */
        .feature-card.wide-feature {
            grid-column: span 2;
        }

        .feature-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            transition: transform 0.7s ease, opacity 0.3s ease;
        }

        .feature-card:hover img {
            transform: scale(1.04);
            opacity: 0.6;
        }

        .feature-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
        }

        .feature-overlay span {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.8);
        }

        .feature-overlay h3 {
            font-family: 'Georgia', serif;
            font-size: 1.4rem;
            line-height: 1.2;
        }

        .main-feature .feature-overlay h3 {
            font-size: 2.2rem;
        }

        /* Responsive Logic */
        @media (max-width: 900px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .feature-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 350px;
            }
            .feature-card.main-feature, .feature-card.wide-feature {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body>

    <section class="features-container">
        <header class="features-header">
            <span>Curated Stories</span>
            <h2>Spring Features</h2>
        </header>

        <div class="feature-grid">
            <a href="#" class="feature-card main-feature">
                <img src="https://images.unsplash.com/photo-1510798831971-661eb04b3739?auto=format&fit=crop&w=800&q=80" alt="Nature Story">
                <div class="feature-overlay">
                    <span>The Nature Issue</span>
                    <h3>Finding Silence in the Arctic: A Journey North</h3>
                </div>
            </a>

            <a href="#" class="feature-card">
                <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=500&q=80" alt="Lighting">
                <div class="feature-overlay">
                    <span>Design</span>
                    <h3>The Alchemy of Light</h3>
                </div>
            </a>

            <a href="#" class="feature-card">
                <img src="https://images.unsplash.com/photo-1454165833019-d11746437722?auto=format&fit=crop&w=500&q=80" alt="Work Culture">
                <div class="feature-overlay">
                    <span>Work</span>
                    <h3>Collaborative Solitude</h3>
                </div>
            </a>

            <a href="#" class="feature-card wide-feature">
                <img src="https://images.unsplash.com/photo-1472289065668-ce650ac443d2?auto=format&fit=crop&w=800&q=80" alt="Art">
                <div class="feature-overlay">
                    <span>Art & Archive</span>
                    <h3>Why We Still Paint: The Physicality of Modern Art</h3>
                </div>
            </a>
        </div>
    </section>

</body>
</html>
